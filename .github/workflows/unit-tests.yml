name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nexa-wal-logic:
    runs-on: macos-15
    defaults:
      run:
        working-directory: Packages/NexaWalLogic
    steps:
      - uses: actions/checkout@v4
      - name: Run NexaWalLogic tests
        run: swift test
